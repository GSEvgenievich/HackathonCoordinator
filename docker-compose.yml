services:
  db:
    image: mysql:8.0
    container_name: hackathon-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: HackathonCoordinator.WebAPI/Dockerfile
    container_name: hackathon-api
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ConnectionStrings__DefaultConnection: Server=db;Port=3306;Database=${DB_NAME};User=${DB_USER};Password=${DB_PASSWORD}
      JWT__Key: ${JWT_KEY}
      JWT__Issuer: ${JWT_ISSUER}
      JWT__Audience: ${JWT_AUDIENCE}
      JWT__ExpireMinutes: ${JWT_EXPIRE_MINUTES}
      GitHubOAuth__ClientId: ${GITHUB_CLIENT_ID}
      GitHubOAuth__ClientSecret: ${GITHUB_CLIENT_SECRET}
      GitHubOAuth__RedirectUri: ${GITHUB_REDIRECT_URI}
      Encryption__Key: ${ENCRYPTION_KEY}
    ports:
      - "5046:8080"
    depends_on:
      db:
        condition: service_healthy

  
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: hackathon-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_ARBITRARY: 0
      UPLOAD_LIMIT: 256M
    ports:
      - "8081:80"
    depends_on:
      - db
        
volumes:
  mysql_data: